          const names = pickArr.map(oid=>{
            const item = (g.items||[]).find(x => (x.id||x.key)===oid);
            const nm = item?.label?.[LANG] || item?.label?.ru || item?.label || item?.name || oid;
            const d = Number(item?.price_delta||0);
            return d ? `${nm} (+${d})` : `${nm}`;
          });
          const gTitle = g.title?.[LANG] || g.title?.ru || g.title || '';
          parts.push(gTitle ? `${gTitle}: ${names.join(', ')}` : names.join(', '));
        }
        return parts.join(' · ');
      }

      function summarizeSelectionsLines(it, selections){
        const opts = normalizeOptions(it);
        const sel = selections || {};
        const lines = [];
        for (const g of opts){
          const gid = g.id || g.key || g.name || '';
          const picked = sel[gid];
          if (!picked) continue;
          const pickArr = Array.isArray(picked) ? picked : [picked];
          const names = pickArr.map(oid=>{
            const item = (g.items||[]).find(x => (x.id||x.key)===oid);
            return item?.label?.[LANG] || item?.label?.ru || item?.label || item?.name || oid;
          });
          const gTitle = groupTitle(g) || gid;
          lines.push(`${gTitle}: ${names.join(', ')}`);
        }
        return lines;
      }

      function buildThumb(imgEl, key){
        let i = 0;
        const trySet = () => imgEl.src = IMG_DIR + key + '.' + IMG_EXTS[i];

          i++;
          if (i < IMG_EXTS.length){
            trySet();
          } else {
            imgEl.closest('.thumb')?.classList.add('noimg');
            imgEl.remove();
          }
        };
        trySet();

            if (!entry || typeof entry.qty !== 'number') continue;
            cart.set(id, {

              selections: entry.selections || {},
              note: entry.note || ''
            });
          }
        }catch(e){ console.warn('Cart load failed', e); }
      }

      function buildMeta(it){
        if (!it) return '';
        const parts = [];
        if (it.weight) parts.push(it.weight + ' g');
        if (it.kcal) parts.push(it.kcal + ' kcal');
        if (it.spicy){
          const level = Math.max(1, Math.min(3, Number(it.spicy)));
          parts.push('🌶'.repeat(level));
        }
        if (Array.isArray(it.tags) && it.tags.length){
          const mapped = it.tags.map(t=>{
            switch(t){
              case 'vegan': return '🌱 vegan';
              case 'veg': return '🥦 veg';
              case 'no_gluten': return '🚫 gluten';
              case 'chef': return '⭐ chef';
              case 'popular': return '🔥 top';
              case 'featured': return '✨ featured';
              case 'custom': return '🛠 custom';
              default: return t;
            }
          });
          parts.push(mapped.join(' · '));
        }
        if (!parts.length) return '';
        return `<div class="meta">${parts.join(' • ')}</div>`;
      }

      function normalizeOptions(it){
        return Array.isArray(it?.options) ? it.options : [];
      }

      function calcItemUnitPrice(it, selections){
        let base = Number(it?.price || 0);
        const opts = normalizeOptions(it);
        const sel = selections || {};
        for (const g of opts){
          const gid = g.id || g.key || g.name || '';
          const picked = sel[gid];
          if (!picked) continue;
          const pickArr = Array.isArray(picked) ? picked : [picked];
          for (const oid of pickArr){
            const found = (g.items || []).find(x => (x.id||x.key) === oid);
            if (found) base += Number(found.price_delta || 0);
          }
        }
        return base;
      }

      function cartSummary(orderType = 'on_site') {
        let itemsCount = 0, sum = 0;
        const lines = [];
        const items = [];
        for (const [id, entry] of cart){
          const qty = entry?.qty || 0;
          if (qty<=0) continue;
          const [cat, idx] = id.split(':');
          const it = menuData[cat]?.[+idx];
          if (!it) continue;
          const name = itemName(it);
          const unit = calcItemUnitPrice(it, entry.selections);
          const key = it.key || it.id || it.code || '';
          const code = it.code || '';
          const optText = summarizeSelections(it, entry.selections);
          const noteText = (entry.note || '').trim();
          itemsCount += qty;
          sum += unit * qty;
          const extra = [optText ? `(${optText})` : '', noteText ? `[${noteText}]` : ''].filter(Boolean).join(' ');
          const isCustom = (Array.isArray(it.tags) && it.tags.includes('custom')) || String(it.key||'').startsWith('custom_') || !!it.is_custom_builder;
          const codeDisplay = code ? `(${code})` : '';
          if (isCustom){
            const optLines = summarizeSelectionsLines(it, entry.selections);
            lines.push(`• ${name} ${codeDisplay} — ${unit.toFixed(2)} ${CURRENCY} × ${qty}`);
            for (const l of optLines){ lines.push(` └ ${l}`); }
            if (noteText) lines.push(` └ Note: ${noteText}`);
          } else {
            lines.push(`• ${name} ${codeDisplay} ${extra} — ${unit.toFixed(2)} ${CURRENCY} × ${qty}`);
          }
          items.push({ name, price: unit, qty, key, code, selections: entry.selections || {}, note: noteText });
        }
        
        let deliveryFee = 0;
        let deliveryText = '';
        if (orderType === 'delivery') {
          if (sum >= FREE_DELIVERY_MIN) {
            deliveryFee = 0;
            deliveryText = L().sheet.freeDelivery;
          } else {
            deliveryFee = DELIVERY_PRICE;
            deliveryText = `${DELIVERY_PRICE} ${CURRENCY}`;
          }
        }
        
        const totalWithDelivery = sum + deliveryFee;
        return {itemsCount, sum, lines, items, deliveryFee, deliveryText, totalWithDelivery};
      }

      function groupTitle(g){
        return g.title?.[LANG] || g.title?.ru || g.title || '';
      }

      function optionLabel(o){
        return o.label?.[LANG] || o.label?.ru || o.label || o.name || o.id || '';
      }

      function validateSelections(it, selections){
        const opts = normalizeOptions(it);
        for (const g of opts){
          const gid = g.id || g.key || g.name || '';
          const picked = selections?.[gid];
          if (g.max && Array.isArray(picked) && picked.length > Number(g.max)){
            return {ok:false, groupId: gid, title: groupTitle(g) || gid};
          }
        }
        return {ok:true};
      }

      function renderDishOptions(it, selections){
        const opts = normalizeOptions(it);
        if (!dishOptions) return;
        if (!opts.length){
          dishOptions.innerHTML = '';
          return;
        }

        dishOptions.innerHTML = opts.map(g=>{
          const gid = g.id || g.key || g.name || '';
          const multi = !!g.multi || (Number(g.max || 0) > 1);
          const max = Number(g.max || (multi ? 99 : 1));
          const required = !!g.required;
          const picked = selections?.[gid] || (multi ? [] : '');
          const pickedArr = Array.isArray(picked) ? picked : [picked].filter(Boolean);

          const itemsHtml = (g.items||[]).map(opt=>{
            const oid = opt.id || opt.key;
            const checked = pickedArr.includes(oid);
            const delta = Number(opt.price_delta || 0);
            const deltaHtml = delta ? `<span class="delta">${delta>0?`+${delta}`:delta} ${CURRENCY}</span>` : '';
            return `
              <label class="opt">
                <input type="${multi?'checkbox':'radio'}"
                       name="opt-${gid}"
                       value="${escapeHtml(oid)}"
                       ${checked?'checked':''}
                       data-gid="${escapeHtml(gid)}"
                       data-multi="${multi?'1':'0'}"
                       data-max="${max}">
                <span class="opt-name">${escapeHtml(optionLabel(opt))}</span>
                ${deltaHtml}
              </label>
            `;
          }).join('');

          return `
            <div class="opt-group" data-group="${escapeHtml(gid)}">
              <div class="opt-head">
                <div class="opt-title">${escapeHtml(groupTitle(g) || '')}</div>
                <div class="muted opt-hint">${required ? L().common.required : L().common.optional}${max && max<99 ? ` · max ${max}`:''}</div>
              </div>
              <div class="opt-list">${itemsHtml}</div>
            </div>
          `;
        }).join('');
      }

      function TG_ENDPOINT() {
        if (TG.PROXY_URL && TG.PROXY_URL.trim()) return TG.PROXY_URL;
        if (!TG.BOT_TOKEN) throw new Error("TG.BOT_TOKEN is empty");
        return `https://api.telegram.org/bot${TG.BOT_TOKEN}/sendMessage`;

      async function sendTelegramMessage(chatId, text) {
        const url = TG_ENDPOINT();
        const payload = {
          chat_id: chatId,
          text,
          parse_mode: "HTML",
          disable_web_page_preview: true
        };
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        let data = null;
        try { data = await r.json(); } catch (_) {}
        if (!r.ok) {
          const msg = (data && (data.description || data.error)) || `HTTP ${r.status}`;
          return { ok: false, reason: msg };
        }
        if (data && data.ok === false) {
          return { ok: false, reason: data.description || "Telegram error" };
        }
        return { ok: true, data };
      }

      function summarizeSelectionsVI(it, selections){
        const opts = normalizeOptions(it);
        const sel = selections || {};
        const parts = [];
        for (const g of opts){
          const gid = g.id || g.key || g.name || '';
          const picked = sel[gid];
          if (!picked) continue;
          const pickArr = Array.isArray(picked) ? picked : [picked];

          const gTitle = g.title?.vn || g.title?.ru || g.title || gid;
          const names = pickArr.map(oid=>{
            const item = (g.items||[]).find(x => (x.id||x.key)===oid);
            const nm = item?.label?.vn || item?.label?.ru || item?.label || item?.name || oid;
            return nm;
          });

          parts.push(`${gTitle}: ${names.join(", ")}`);
        }
        return parts.join(" · ");
      }

      function buildVietnameseOrderText(orderPayload){
        const total = Number(orderPayload.total || 0).toFixed(2);
        const subtotal = Number(orderPayload.subtotal || orderPayload.total || 0).toFixed(2);
        const deliveryFee = Number(orderPayload.delivery_fee || 0).toFixed(2);

        const meta = [];
        if (orderPayload.type === "on_site" && orderPayload.table) meta.push(`Bàn: <b>${escapeHtml(orderPayload.table)}</b>`);
        if (orderPayload.type === "takeaway" && orderPayload.pickup_in) meta.push(`Nhận sau: <b>${escapeHtml(orderPayload.pickup_in)} phút</b>`);
        if (orderPayload.type === "delivery" && orderPayload.address) meta.push(`Địa chỉ: <b>${escapeHtml(orderPayload.address)}</b>`);
        if (orderPayload.phone) meta.push(`SĐT: <b>${escapeHtml(orderPayload.phone)}</b>`);
        if (orderPayload.type === "delivery" && deliveryFee > 0) {
          meta.push(`Phí giao hàng: <b>${deliveryFee} ${CURRENCY}</b>`);
        }

        const lines = (orderPayload.items || []).map(itm=>{
          const found = itm.key ? findByKey(itm.key) : null;
          const optText = found?.it ? summarizeSelectionsVI(found.it, itm.selections) : '';
          const note = (itm.note || "").trim();
          const extra = [optText ? `(${escapeHtml(optText)})` : '', note ? `📝 ${escapeHtml(note)}` : ''].filter(Boolean).join(' ');
          const code = itm.code ? `(${escapeHtml(itm.code)})` : '';
          return `• ${escapeHtml(itm.name)} ${code} ${extra} — ${Number(itm.price || 0).toFixed(2)} ${CURRENCY} × ${Number(itm.qty || 0)}`;
        }).join("\n") || "—";

        return `<b>CYBER DRAGON — Đơn mới</b>
ID: <code>${escapeHtml(orderPayload.id)}</code>
Code: <b>${escapeHtml(orderPayload.code)}</b>
Tạm tính: <b>${subtotal} ${CURRENCY}</b>
${deliveryFee > 0 ? `Phí giao hàng: <b>${deliveryFee} ${CURRENCY}</b>` : ''}
Tổng cộng: <b>${total} ${CURRENCY}</b>
Hình thức: <b>${viType(orderPayload.type)}</b>
${meta.join("\n")}
<b>Món:</b>
${lines}`;
      }

      function updateActive(){

        if (!header || !catNav) return;
        const stickyH = header.offsetHeight + catNav.offsetHeight;
        let maxTop = -Infinity;
        let closest = null;
        $$('section').forEach(sec => {
          if (!sec.id || !sec.id.startsWith('sec-')) return;
          const top = sec.getBoundingClientRect().top;
          if (top <= stickyH && top > maxTop){
            maxTop = top;
            closest = sec;
          }
        });
        if (closest){
          const cat = closest.id.replace('sec-','');
          if (cat !== activeCat){
            activeCat = cat;
            $$('.pill').forEach(p => p.classList.remove('active'));
            const pill = $(`.pill[href="#${closest.id}"]`);
            if (pill){
              pill.classList.add('active');
              pill.scrollIntoView({behavior:'smooth',inline:'center'});
            }
          }
        }
      }

      window.addEventListener('scroll', debounce(updateActive,50));

      function islandThreshold(){ return 80; }
      let islandActive = false;

      const onScrollIsland = (() => {
        let ticking = false;
        return () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const needIsland = window.scrollY > islandThreshold();
            if (needIsland !== islandActive){
              islandActive = needIsland;
              document.body.classList.toggle('island', islandActive);
            }
            ticking = false;
          });
        };
      })();

      window.addEventListener('scroll', onScrollIsland, {passive:true});
      window.addEventListener('resize', onScrollIsland);
      onScrollIsland();

      const dockCat = $('#dockCat');
      const dockView = $('#dockView');
      const dockMore = $('#dockMore');
      const dockLang = $('#dockLang');
      const dockCart = $('#dockCart');
      const langPopup = $('#langPopup');
      const catOverlayEl = $('#catOverlay');
      const catSheetEl = $('#catSheet');
      const catSheetList = $('#catSheetList');

      function buildCatSheet(){
        if (!catSheetList) return;
        const keys = Object.keys(menuData || {});
        catSheetList.innerHTML = keys.map(k =>
          `<button class="chip" data-goto="#sec-${k}">${catLabel(k)}</button>`
        ).join('');
      }

      catOverlayEl?.addEventListener('click', closeCatSheet);
      $('#moreOverlay')?.addEventListener('click', closeMoreSheet);

      catSheetEl?.addEventListener('click', e=>{
        const b = e.target.closest('[data-goto]');
        if (!b) return;
        const target = b.getAttribute('data-goto');
        closeCatSheet();
        document.querySelector(target)?.scrollIntoView({behavior:'smooth',block:'start'});
      });

      function setActiveDock(btn){
        $$('.dock-btn').forEach(b=>{
          if (b === btn) b.classList.add('active');
          else b.classList.remove('active');
        });
      }

      dockCat?.addEventListener('click', ()=>{
        setActiveDock(dockCat);
        buildCatSheet();
        openCatSheet();
      });

      dockView?.addEventListener('click', ()=>{
        setActiveDock(dockView);
        viewMode = (viewMode === 'grid') ? 'list' : 'grid';
        localStorage.setItem(VIEW_KEY, viewMode);
        applyView();
        applyDockLabels();
      });

      dockLang?.addEventListener('click', (e)=>{
        e.stopPropagation();
        setActiveDock(dockLang);
        if (!langPopup) return;
        langPopup.classList.toggle('show');
      });

      langPopup?.addEventListener('click', e=>{
        const b = e.target.closest('[data-lang]');
        if (!b) return;
        const code = b.dataset.lang;
        setLang(code);
        langPopup.classList.remove('show');
      });

      document.addEventListener('click', e=>{
        if (!langPopup) return;
        if (!langPopup.contains(e.target) && !dockLang.contains(e.target)){
          langPopup.classList.remove('show');
        }
      });

      dockMore?.addEventListener('click', (e)=>{
        e.stopPropagation();
        setActiveDock(dockMore);
        openMoreSheet();
      });

      dockCart?.addEventListener('click', ()=>{
        setActiveDock(dockCart);
        openSheet();
      });

      const brandEl = $('#brandTap');
      brandEl?.addEventListener('click', (e)=>{
        if (!document.body.classList.contains('island')) return;
        e.preventDefault();
        window.scrollTo({top:0, behavior:'smooth'});
      });

      $('#sheetClose')?.addEventListener('click', (e)=>{ e.stopPropagation(); closeSheet(); });
      $('#catSheetClose')?.addEventListener('click', (e)=>{ e.stopPropagation(); closeCatSheet(); });
      $('#moreSheetClose')?.addEventListener('click', (e)=>{ e.stopPropagation(); closeMoreSheet(); });

      document.addEventListener('keydown', e=>{
        if (e.key === 'Escape'){
          if ($('#sheet')?.classList.contains('open')) closeSheet();
          if ($('#catSheet')?.classList.contains('open')) closeCatSheet();
          if ($('#moreSheet')?.classList.contains('open')) closeMoreSheet();
          if ($('#dishSheet')?.classList.contains('open')) closeDishSheet();
          if (langPopup?.classList.contains('show')) langPopup.classList.remove('show');
          if ($('#bankSheet')?.classList.contains('open')) closeBankSheet();
        }
      });

      /* BANK SELECTION MODAL */
      const bankOverlay = $('#bankOverlay');
      const bankSheet = $('#bankSheet');
      const bankSheetClose = $('#bankSheetClose');
      const bankList = $('#bankList');
      const paySwitcher = $('#paySwitcher');

      const payItems = [
        { name: 'Apple Pay', icon: 'images/icon/applepay.png', link: UNIVERSAL_PAY_LINK },
        { name: 'Google Pay', icon: 'images/icon/gpay.png', link: UNIVERSAL_PAY_LINK },
        { name: 'Privat24', icon: 'images/icon/privat24.png', link: UNIVERSAL_PAY_LINK },
        { name: 'Monobank', icon: 'images/icon/monobank.png', link: UNIVERSAL_PAY_LINK }
      ];

      function renderBankList() {
        if (!bankList) return;
        bankList.innerHTML = payItems.map(item => `
          <button class="chip bank-option" data-link="${item.link}" style="display:flex; align-items:center; gap:12px; width:100%; justify-content:flex-start;">
            <img src="${item.icon}" alt="${item.name}" style="width:24px; height:24px;">
            ${item.name}
          </button>
        `).join('');
      }

      function openBankSheet() {
        document.body.classList.add('sheet-open');
        bankOverlay?.classList.add('show');
        bankSheet?.classList.add('open');
      }

      function closeBankSheet() {
        document.body.classList.remove('sheet-open');
        bankOverlay?.classList.remove('show');
        bankSheet?.classList.remove('open');
      }

      if (paySwitcher) {
        paySwitcher.addEventListener('click', (e) => {
          e.preventDefault();
          openBankSheet();
        });
      }

      bankOverlay?.addEventListener('click', closeBankSheet);
      bankSheetClose?.addEventListener('click', closeBankSheet);

      bankList?.addEventListener('click', (e) => {
        const btn = e.target.closest('.bank-option');
        if (!btn) return;
        const link = btn.dataset.link;
        if (link) {
          window.open(link, '_blank', 'noopener,noreferrer');
        }
        closeBankSheet();
      });

      const payIcon = $('#payIcon');
      const payText = $('#payText');
      if (payIcon && payText && payItems[0]) {
        payIcon.src = payItems[0].icon;
        payIcon.alt = payItems[0].name;
        payText.textContent = payItems[0].name;
      }

      (function(){
        const cartSheet = $('#sheet');
        const cartOverlay = $('#overlay');
        const catSheet = $('#catSheet');
        const catOverlay = $('#catOverlay');
        const moreSheet = $('#moreSheet');
        const moreOverlay = $('#moreOverlay');
        const bankSheetEl = $('#bankSheet');
        const bankOverlayEl = $('#bankOverlay');
        const DRAG_START_ZONE = 40;
        const DISMISS_Y = 120;
        const MAX_DRAG = 280;

        function attachSwipe(sheetEl, overlayEl, closeFn){
          if (!sheetEl) return;
          let startY = 0;
          let currentY = 0;
          let dragging = false;

          function onStart(e){
            const touch = e.touches && e.touches[0];
            if (!touch) return;
            const rect = sheetEl.getBoundingClientRect();
            const offsetY = touch.clientY - rect.top;
            if (offsetY > DRAG_START_ZONE) return;
            dragging = true;
            startY = touch.clientY;
            currentY = 0;
            sheetEl.style.transition = 'transform .0s';
            if (overlayEl) overlayEl.style.transition = 'opacity .0s';
          }

          function onMove(e){
            if (!dragging) return;
            const touch = e.touches && e.touches[0];
            if (!touch) return;
            const dy = touch.clientY - startY;
            if (dy <= 0){
              currentY = 0;
              sheetEl.style.transform = 'translateY(0)';
              if (overlayEl) overlayEl.style.opacity = '1';
              return;
            }
            currentY = Math.min(dy, MAX_DRAG);
            const progress = currentY / MAX_DRAG;
            sheetEl.style.transform = `translateY(${currentY}px)`;
            if (overlayEl) overlayEl.style.opacity = String(1 - progress * 0.7);
          }

          function onEnd(){
            if (!dragging) return;
            dragging = false;
            sheetEl.style.transition = 'transform .22s ease';
            if (overlayEl) overlayEl.style.transition = 'opacity .22s ease';
            if (currentY > DISMISS_Y){
              sheetEl.style.transform = `translateY(${MAX_DRAG}px)`;
              if (overlayEl) overlayEl.style.opacity = '0';
              setTimeout(()=>{
                sheetEl.style.transform = '';
                if (overlayEl) overlayEl.style.opacity = '';
                closeFn();
              },200);
            } else {
              sheetEl.style.transform = 'translateY(0)';
              if (overlayEl) overlayEl.style.opacity = '1';
            }
          }

          sheetEl.addEventListener('touchstart', onStart, {passive:true});
          sheetEl.addEventListener('touchmove', onMove, {passive:true});
          sheetEl.addEventListener('touchend', onEnd);
          sheetEl.addEventListener('touchcancel',onEnd);
        }

        attachSwipe(cartSheet, cartOverlay, closeSheet);
        attachSwipe(catSheet, catOverlay, closeCatSheet);
        attachSwipe(moreSheet, moreOverlay, closeMoreSheet);
        attachSwipe(bankSheetEl, bankOverlayEl, closeBankSheet);
      })();

      (function(){
        const v = document.querySelector('video.promo');
        if (!v) return;
        const tryPlay = () => v.play().catch(()=>{});
        tryPlay();
        const once = () => {
          tryPlay();
          window.removeEventListener('touchstart', once);
          window.removeEventListener('click', once);
        };
        window.addEventListener('touchstart', once, {once:true, passive:true});
        window.addEventListener('click', once, {once:true, passive:true});
      })();

      (function init(){
        loadCart();

        try{
          const arr = menuData?.pho_soups;
          if (Array.isArray(arr) && !arr.some(x => x && x.key === 'pho_custom')){
            arr.unshift({
              key:'pho_custom',
              price: 160,
              weight: 450,
              spicy: 0,
              tags:['chef','popular'],
              translations:{
                ru:'Pho — Собери сам',
                ua:'Pho — Збери сам',
                vn:'Phở — Tự chọn',
              },
              short:'Бульон + лапша. Выбираешь мясо/тофу/креветки и добавки.',
              options:[
                {id:'protein', title:{ru:'Белок',ua:'Білок',vn:'Đạm'}, required:true, multi:true, max:2,
                  items:[
                    {id:'beef', label:{ru:'Говядина',ua:'Яловичина',vn:'Bò'}, price_delta:40},
                    {id:'chicken', label:{ru:'Курица',ua:'Курка',vn:'Gà'}, price_delta:30},
                    {id:'pork', label:{ru:'Свинина',ua:'Свинина',vn:'Heo'}, price_delta:30},
                    {id:'shrimp', label:{ru:'Креветки',ua:'Креветки',vn:'Tôm'}, price_delta:50},
                    {id:'tofu', label:{ru:'Тофу',ua:'Тофу',vn:'Đậu phụ'}, price_delta:20},
                  ]},
                {id:'extras', title:{ru:'Добавки',ua:'Додатки',vn:'Thêm'}, required:false, multi:true, max:5,
                  items:[
                    {id:'corn', label:{ru:'Кукуруза',ua:'Кукурудза',vn:'Bắp'}, price_delta:15},
                    {id:'scallion', label:{ru:'Зелёный лук',ua:'Зелена цибуля',vn:'Hành lá'}, price_delta:10},
                    {id:'onion', label:{ru:'Лук',ua:'Цибуля',vn:'Hành'}, price_delta:8},
                    {id:'peanut', label:{ru:'Арахис',ua:'Арахіс',vn:'Đậu phộng'}, price_delta:12},
                  ]}
              ]
            });
          }
        }catch(e){}

        if (selA) selA.value = LANG;
        if (selB) selB.value = LANG;

        const flag = LANG_FLAGS[LANG] || '🌐';
        const langFlagEl = $('#dockLangFlag');
        if (langFlagEl) langFlagEl.textContent = flag;

        setUITexts();
        renderBankList();

        const header = $('.header');
        const catNav = $('.cat-nav');
        if (header && catNav){
          catNav.style.top = `${header.offsetHeight}px`;
        }

        updateActive();
        applyView();
      })();
    </script>
  </div>
</body>
