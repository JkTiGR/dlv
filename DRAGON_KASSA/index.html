<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAGON KASSA Redirect</title>
  <link rel="stylesheet" href="../dragon-theme.css" />
</head>
<body>
  <p>Перенаправление в DRAGON KASSA...</p>
  <p><a id="targetLink" href="../DRAGON_KASSA.html">Открыть кассу</a></p>
  <script>
    (function redirectToKassa() {
      const current = new URL(window.location.href);
      const target = new URL("../DRAGON_KASSA.html", current);
      target.search = current.search;
      target.hash = current.hash;
      const link = document.getElementById("targetLink");
      if (link) link.href = target.toString();
      window.location.replace(target.toString());
    })();
  </script>
</body>
</html>
