<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#0a0616" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAGON KASSA Redirect</title>
  <link rel="icon" href="../logo.png" />
  <link rel="stylesheet" href="../dragon-theme.css" />
</head>
<body class="dragon-unified dragon-redirect-page">
  <main class="dragon-redirect-card dragon-surface">
    <h1>Перенаправление в DRAGON KASSA</h1>
    <p>Используется актуальная корневая страница кассы.</p>
    <p><a id="targetLink" href="../DRAGON_KASSA.html">Открыть кассу</a></p>
  </main>
  <script>
    (function redirectToKassa() {
      const current = new URL(window.location.href);
      const target = new URL("../DRAGON_KASSA.html", current);
      target.search = current.search;
      target.hash = current.hash;
      const link = document.getElementById("targetLink");
      if (link) link.href = target.toString();
      window.location.replace(target.toString());
    })();
  </script>
</body>
</html>
