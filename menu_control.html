<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080101" />
  <title>DRAGON Menu Control</title>
  <link rel="icon" href="logo.png" />
  <style>
    :root {
      --bg: #030000;
      --panel: rgba(25, 3, 5, 0.92);
      --panel-2: rgba(46, 6, 9, 0.72);
      --line: rgba(255, 56, 42, 0.2);
      --text: #fff2ee;
      --muted: #d4a4a8;
      --accent: #ff160d;
      --accent-2: #ff7a24;
      --ok: #39ff88;
      --warn: #ffe600;
      --danger: #ff4a3a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.48), 0 0 28px rgba(255, 22, 13, 0.2);
      --radius: 24px;
      --font-head: "Space Grotesk", "Segoe UI", sans-serif;
      --font-body: "Manrope", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-body);
      background:
        repeating-linear-gradient(90deg, rgba(255, 38, 24, 0.07) 0 1px, transparent 1px 52px),
        repeating-linear-gradient(180deg, rgba(0, 0, 0, 0.14) 0 1px, transparent 1px 6px),
        linear-gradient(180deg, rgba(246, 18, 12, 0.42), rgba(7, 0, 0, 0.92) 72%, #010000),
        radial-gradient(900px 560px at 0% 0%, rgba(255, 26, 13, 0.24), transparent 62%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .page {
      width: min(1420px, calc(100vw - 28px));
      margin: 18px auto 32px;
      display: grid;
      gap: 16px;
    }

    .hero,
    .panel,
    .item-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), rgba(12, 1, 2, 0.9));
      box-shadow: var(--shadow), inset 0 0 24px rgba(255, 22, 13, 0.06);
      overflow: hidden;
    }

    .hero {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--font-head);
      letter-spacing: -0.04em;
      text-shadow: 0 0 18px rgba(255, 22, 13, 0.26);
    }

    .hero p,
    .muted {
      color: var(--muted);
      line-height: 1.5;
    }

    .hero p {
      margin: 8px 0 0;
      max-width: 820px;
    }

    .actions,
    .stats,
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      text-decoration: none;
      font-weight: 850;
    }

    .btn.primary {
      color: #230202;
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 22px rgba(255, 22, 13, 0.28);
    }

    .btn.danger {
      color: #fff;
      border-color: rgba(255, 74, 58, 0.35);
      background: rgba(255, 74, 58, 0.14);
    }

    .stat {
      min-width: 150px;
      flex: 1 1 150px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.045);
    }

    .stat .k {
      color: var(--muted);
      font-size: 12px;
    }

    .stat .v {
      margin-top: 4px;
      font-family: var(--font-head);
      font-size: 30px;
      font-weight: 900;
    }

    .panel {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .filters {
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      flex: 1 1 220px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input,
    .select {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      outline: none;
      padding: 10px 12px;
    }

    .input:focus,
    .select:focus {
      border-color: rgba(255, 92, 70, 0.48);
      box-shadow: 0 0 0 3px rgba(255, 22, 13, 0.12);
    }

    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .item-card {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .item-card.disabled {
      border-color: rgba(255, 74, 58, 0.42);
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 74, 58, 0.12), transparent 42%),
        linear-gradient(180deg, rgba(45, 5, 8, 0.96), rgba(12, 1, 2, 0.94));
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-name {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .item-name strong {
      font-size: 18px;
      line-height: 1.25;
    }

    .code {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      color: #ffd6c9;
      background: rgba(255, 255, 255, 0.08);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.on {
      color: #041306;
      background: var(--ok);
      box-shadow: 0 0 18px rgba(57, 255, 136, 0.25);
    }

    .badge.off {
      color: #fff;
      background: rgba(255, 74, 58, 0.22);
      border: 1px solid rgba(255, 74, 58, 0.34);
      box-shadow: 0 0 18px rgba(255, 22, 13, 0.22);
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 20px;
    }

    @media (max-width: 880px) {
      .list {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-head">
        <div>
          <h1>DRAGON Menu Control</h1>
          <p>Управление позициями для `index.html`: если сегодня блюда нет, выключи его здесь. Завтра позиция автоматически снова появится.</p>
        </div>
        <div class="actions">
          <a class="btn" href="index.html">Открыть меню</a>
          <a class="btn" href="DRAGON_KASSA.html">Kassa</a>
          <a class="btn" href="admin_index.html">Admin</a>
          <button class="btn danger" id="clearTodayBtn" type="button">Вернуть всё сегодня</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">Всего позиций</div>
          <div class="v" id="statTotal">0</div>
        </div>
        <div class="stat">
          <div class="k">Доступно</div>
          <div class="v" id="statOn">0</div>
        </div>
        <div class="stat">
          <div class="k">Нет сегодня</div>
          <div class="v" id="statOff">0</div>
        </div>
        <div class="stat">
          <div class="k">Дата</div>
          <div class="v" id="statDate">—</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="filters">
        <div class="field">
          <label for="searchInput">Поиск</label>
          <input class="input" id="searchInput" type="search" placeholder="код, название RU/VN..." autocomplete="off" />
        </div>
        <div class="field">
          <label for="categorySelect">Категория</label>
          <select class="select" id="categorySelect"></select>
        </div>
        <div class="field">
          <label for="modeSelect">Показать</label>
          <select class="select" id="modeSelect">
            <option value="all">Все позиции</option>
            <option value="off">Только нет сегодня</option>
            <option value="on">Только доступные</option>
          </select>
        </div>
      </div>

      <div class="muted" id="syncLabel">Загрузка настроек...</div>
      <div class="list" id="itemsList"></div>
    </section>
  </main>

  <script src="dragon_static_config.js"></script>
  <script src="menu.js"></script>
  <script src="menu_availability.js"></script>
  <script>
    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

    const CAT_LABELS = {
      pho_soups: "Фо (супы)",
      bun_soups: "Бун (супы)",
      salat_bun: "Бун (салат)",
      mi_soups: "Ми (супы)",
      mien_soups: "Миен (супы)",
      wok_fried_mien: "WOK Миен",
      wok_fried_mi: "WOK Ми",
      wok_fried_pho: "WOK Фо",
      rice: "Рис",
      drinks: "Напитки",
      extras: "Дополнительно"
    };

    const state = {
      search: "",
      category: "all",
      mode: "all"
    };

    function api() {
      return window.DRAGON_MENU_AVAILABILITY;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isBuilderItem(it) {
      if (!it) return false;
      const key = String(it.key || "").toLowerCase();
      const tags = Array.isArray(it.tags) ? it.tags.map(x => String(x).toLowerCase()) : [];
      const nameRu = String(it?.translations?.ru || "").toLowerCase();
      const nameUa = String(it?.translations?.ua || "").toLowerCase();
      const nameVn = String(it?.translations?.vn || "").toLowerCase();
      return (
        key === "pho_custom" ||
        key.startsWith("custom_") ||
        key.startsWith("build_") ||
        !!it.is_custom_builder ||
        tags.includes("custom") ||
        nameRu.includes("собери сам") ||
        nameUa.includes("збери сам") ||
        nameVn.includes("tự chọn")
      );
    }

    function catLabel(key) {
      return CAT_LABELS[key] || String(key || "").replaceAll("_", " ");
    }

    function itemName(it, lang = "ru") {
      return api().itemTitle(it, lang);
    }

    function itemKey(it) {
      return api().itemKey(it);
    }

    function allItems() {
      const rows = [];
      Object.entries(window.menuData || {}).forEach(([cat, arr]) => {
        (arr || []).forEach((it, index) => {
          if (!it || isBuilderItem(it)) return;
          const key = itemKey(it);
          if (!key) return;
          rows.push({ cat, index, key, it });
        });
      });
      return rows;
    }

    function filteredItems() {
      const data = api().load();
      const q = state.search.trim().toLowerCase();

      return allItems().filter(row => {
        const off = api().isDisabled(row.key, api().todayKey(), data);
        if (state.category !== "all" && row.cat !== state.category) return false;
        if (state.mode === "off" && !off) return false;
        if (state.mode === "on" && off) return false;
        if (!q) return true;
        const hay = [
          row.key,
          row.it.code,
          row.cat,
          row.it.translations?.ru,
          row.it.translations?.ua,
          row.it.translations?.vn,
          row.it.short?.ru,
          row.it.short?.vn
        ].join(" ").toLowerCase();
        return hay.includes(q);
      });
    }

    function renderCategorySelect() {
      const select = $("#categorySelect");
      const cats = Object.keys(window.menuData || {}).filter(cat => (
        Array.isArray(menuData[cat]) && menuData[cat].some(it => it && !isBuilderItem(it))
      ));
      select.innerHTML = [
        `<option value="all">Все категории</option>`,
        ...cats.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(catLabel(cat))}</option>`)
      ].join("");
      select.value = state.category;
    }

    function renderStats() {
      const data = api().load();
      const rows = allItems();
      const off = rows.filter(row => api().isDisabled(row.key, api().todayKey(), data)).length;
      $("#statTotal").textContent = String(rows.length);
      $("#statOn").textContent = String(rows.length - off);
      $("#statOff").textContent = String(off);
      $("#statDate").textContent = api().todayKey();
      $("#syncLabel").textContent = data.updated_at
        ? `Сохранено: ${new Date(data.updated_at).toLocaleString()}`
        : "Настройки ещё не сохранялись";
    }

    function renderItems() {
      const list = $("#itemsList");
      const data = api().load();
      const rows = filteredItems();

      if (!rows.length) {
        list.innerHTML = `<div class="empty">Нет позиций по текущим фильтрам.</div>`;
        return;
      }

      list.innerHTML = rows.map(row => {
        const rec = api().recordFor(row.key, data);
        const off = api().isDisabled(row.key, api().todayKey(), data);
        const name = itemName(row.it, "ru");
        const vn = itemName(row.it, "vn");
        const code = row.it.code || row.key;
        const reason = rec?.reason || "";

        return `
          <article class="item-card ${off ? "disabled" : ""}" data-key="${escapeHtml(row.key)}">
            <div class="item-head">
              <div class="item-name">
                <span class="code">${escapeHtml(code)}</span>
                <strong>${escapeHtml(name)}</strong>
                <span class="muted">${escapeHtml(vn)} • ${escapeHtml(catLabel(row.cat))} • ${Number(row.it.price || 0)} грн</span>
              </div>
              <span class="badge ${off ? "off" : "on"}">${off ? "Нет сегодня" : "Доступно"}</span>
            </div>

            <div class="row">
              <div class="field">
                <label>Причина / note</label>
                <input class="input" data-reason="${escapeHtml(row.key)}" value="${escapeHtml(reason)}" placeholder="Например: нет говядины, закончился рис..." />
              </div>
              <button class="btn ${off ? "primary" : "danger"}" type="button" data-toggle="${escapeHtml(row.key)}">
                ${off ? "Вернуть в меню" : "Нет сегодня"}
              </button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderAll() {
      renderStats();
      renderItems();
    }

    let reasonTimer = null;
    function scheduleReasonSave(key, value) {
      clearTimeout(reasonTimer);
      reasonTimer = setTimeout(() => {
        api().setReason(key, value);
        renderStats();
      }, 220);
    }

    $("#searchInput").addEventListener("input", event => {
      state.search = event.target.value || "";
      renderItems();
    });

    $("#categorySelect").addEventListener("change", event => {
      state.category = event.target.value || "all";
      renderItems();
    });

    $("#modeSelect").addEventListener("change", event => {
      state.mode = event.target.value || "all";
      renderItems();
    });

    $("#clearTodayBtn").addEventListener("click", () => {
      if (!confirm("Вернуть все позиции в меню сегодня?")) return;
      api().clearToday();
      renderAll();
    });

    $("#itemsList").addEventListener("click", event => {
      const btn = event.target.closest("[data-toggle]");
      if (!btn) return;
      const key = btn.dataset.toggle;
      const off = api().isDisabled(key);
      const reason = $(`[data-reason="${CSS.escape(key)}"]`)?.value || "";
      api().setTodayDisabled(key, !off, reason);
      renderAll();
    });

    $("#itemsList").addEventListener("input", event => {
      const input = event.target.closest("[data-reason]");
      if (!input) return;
      scheduleReasonSave(input.dataset.reason, input.value);
    });

    window.addEventListener("storage", event => {
      if (event.key === api().STORAGE_KEY) renderAll();
    });

    (async function init() {
      renderCategorySelect();
      await api().refresh();
      renderAll();
    })();
  </script>
  <script src="dragon_burger_menu.js"></script>
</body>
</html>
