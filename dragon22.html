<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>DRAGON — Menu</title>
  <link rel="stylesheet" href="dragon-theme.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      background:
        radial-gradient(780px 420px at 50% 102%, rgba(219, 198, 255, 0.08), transparent 34%),
        radial-gradient(760px 540px at 18% 12%, rgba(148, 102, 255, 0.12), transparent 48%),
        radial-gradient(700px 520px at 84% 10%, rgba(255, 104, 218, 0.09), transparent 44%),
        radial-gradient(520px 360px at 50% 34%, rgba(109, 124, 255, 0.07), transparent 54%),
        linear-gradient(180deg, rgba(8, 5, 16, 0.38) 0%, rgba(13, 8, 24, 0.5) 38%, rgba(9, 4, 18, 0.7) 100%),
        url("fonHOME1.png") center top / cover no-repeat fixed,
        #08060f;
    }

    .box {
      max-width: 420px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      background: rgba(11, 8, 24, 0.48);
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .muted {
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>DRAGON Menu</h1>
    <p class="muted">Загружаю меню…</p>
  </div>
  <script>
    const LEGACY_INDEX_BLOB = "48d2232a03e8101026caafaa2a252362a50a3dfb";
    const API_URL = `https://api.github.com/repos/JkTiGR/dlv/git/blobs/${LEGACY_INDEX_BLOB}`;
    const DRAGON_GO_HOME_URL = "https://jktigr.github.io/DRAGON-GO/HOME.html";
    const MENU_THEME_STYLE = `<style>
body.dragon-menu-page {
  background:
    radial-gradient(780px 420px at 50% 102%, rgba(219, 198, 255, 0.08), transparent 34%),
    radial-gradient(760px 540px at 18% 12%, rgba(148, 102, 255, 0.12), transparent 48%),
    radial-gradient(700px 520px at 84% 10%, rgba(255, 104, 218, 0.09), transparent 44%),
    radial-gradient(520px 360px at 50% 34%, rgba(109, 124, 255, 0.07), transparent 54%),
    linear-gradient(180deg, rgba(8, 5, 16, 0.38) 0%, rgba(13, 8, 24, 0.5) 38%, rgba(9, 4, 18, 0.7) 100%),
    url("fonHOME1.png") center top / cover no-repeat fixed,
    var(--bg, #06040d);
}
</style>`;

    function decodeBase64Utf8(base64) {
      const binary = atob(String(base64 || "").replace(/\s/g, ""));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder("utf-8").decode(bytes);
    }

    function rewriteMenuLinks(html) {
      return html
        .replace(
          /(<a\b[^>]*\bid=(["'])navHome\2[^>]*\bhref=)(["'])index\.html\3/gi,
          `$1$3${DRAGON_GO_HOME_URL}$3`
        )
        .replace(
          /(<a\b[^>]*\bhref=)(["'])index\.html\2([^>]*\bid=(["'])navHome\4)/gi,
          `$1$2${DRAGON_GO_HOME_URL}$2$3`
        )
        .replace(/href=(["'])index\.html\1/g, 'href=$1menu.html$1');
    }

    function injectMenuTheme(html) {
      const withTheme = html.includes("</head>")
        ? html.replace("</head>", `${MENU_THEME_STYLE}</head>`)
        : html;

      if (/<body[^>]*\bclass=/i.test(withTheme)) {
        return withTheme.replace(
          /<body([^>]*\bclass=["'])([^"']*)(["'][^>]*)>/i,
          '<body$1$2 dragon-menu-page$3>'
        );
      }

      return withTheme.replace(/<body([^>]*)>/i, '<body class="dragon-menu-page"$1>');
    }

    fetch(API_URL, { cache: "force-cache" })
      .then((response) => {
        if (!response.ok) throw new Error("Cannot load menu source");
        return response.json();
      })
      .then((blob) => {
        const html = decodeBase64Utf8(blob.content);
        const themedHtml = rewriteMenuLinks(injectMenuTheme(html));
        document.open();
        document.write(themedHtml);
        document.close();
      })
      .catch(() => {
        document.body.innerHTML = `<div class="box"><h1>Меню временно не загрузилось</h1><p class="muted">Обновите страницу или откройте позже.</p><p><a style="color:#ffd36a" href="${DRAGON_GO_HOME_URL}">Вернуться на HOME</a></p></div>`;
      });
  </script>
</body>
</html>
