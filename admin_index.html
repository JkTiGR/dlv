<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080101">
  <title>CYBER DRAGON — Admin Panel</title>
  <link rel="icon" href="logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:
        repeating-linear-gradient(90deg, rgba(255, 38, 24, 0.07) 0 1px, transparent 1px 52px),
        repeating-linear-gradient(180deg, rgba(0, 0, 0, 0.15) 0 1px, transparent 1px 6px),
        linear-gradient(180deg, rgba(246, 18, 12, 0.5) 0%, rgba(118, 0, 6, 0.2) 34%, rgba(7, 0, 0, 0.88) 78%, #010000 100%),
        radial-gradient(900px 560px at 8% 0%, rgba(255, 26, 13, 0.26), transparent 62%),
        linear-gradient(135deg, #030000 0%, #170101 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    /* Header */
    .admin-header {
      background: rgba(24, 4, 7, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 58, 45, 0.14);
      border-radius: 24px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 20px 58px rgba(0, 0, 0, 0.42), 0 0 26px rgba(255, 22, 13, 0.18);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      height: 48px;
      width: auto;
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff3ef, #ff2a1f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 22, 13, 0.26));
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 12px 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 18px rgba(255, 22, 13, 0.1);
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ff4a3a;
    }

    .stat-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .tab-btn {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: linear-gradient(90deg, #ff2a1f, #ff9a3d);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 18px rgba(255, 42, 31, 0.34), 0 0 24px rgba(255, 22, 13, 0.24);
    }

    /* Filters */
    .filters {
      background: rgba(24, 4, 7, 0.84);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .filter-group {
      flex: 1;
      min-width: 150px;
    }

    .filter-group label {
      display: block;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 10px 12px;
      border-radius: 12px;
      color: white;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: #ff6b6b;
      background: rgba(255, 255, 255, 0.12);
    }

    .filter-group button {
      background: linear-gradient(90deg, #ff6b6b, #ff4242);
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .filter-group button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 66, 66, 0.4);
    }

    /* Orders Table */
    .orders-container {
      background: rgba(15, 18, 30, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow-x: auto;
      margin-bottom: 24px;
    }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    .orders-table th {
      text-align: left;
      padding: 16px 12px;
      background: rgba(255, 255, 255, 0.05);
      font-weight: 600;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .orders-table td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
    }

    .orders-table tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    /* Status Badges */
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-new { background: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.3); }
    .status-confirmed { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
    .status-cooking { background: rgba(241, 196, 15, 0.2); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.3); }
    .status-ready { background: rgba(155, 89, 182, 0.2); color: #9b59b6; border: 1px solid rgba(155, 89, 182, 0.3); }
    .status-completed { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
    .status-cancelled { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }

    /* Order Type Badges */
    .order-type {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .type-on_site { background: rgba(52, 152, 219, 0.2); color: #3498db; }
    .type-takeaway { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
    .type-delivery { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-sm {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-view {
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
      border: 1px solid rgba(52, 152, 219, 0.3);
    }
    .btn-view:hover {
      background: #3498db;
      color: white;
    }

    .btn-update {
      background: rgba(241, 196, 15, 0.2);
      color: #f1c40f;
      border: 1px solid rgba(241, 196, 15, 0.3);
    }
    .btn-update:hover {
      background: #f1c40f;
      color: #170405;
    }

    .btn-complete {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
      border: 1px solid rgba(46, 204, 113, 0.3);
    }
    .btn-complete:hover {
      background: #2ecc71;
      color: white;
    }

    .btn-cancel {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }
    .btn-cancel:hover {
      background: #e74c3c;
      color: white;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #210507, #080101);
      border: 1px solid rgba(255, 58, 45, 0.18);
      border-radius: 28px;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-header h2 {
      font-size: 1.5rem;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .order-detail-row {
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
    }

    .order-detail-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .order-detail-value {
      font-size: 1rem;
      font-weight: 500;
    }

    .items-list {
      margin-top: 12px;
    }

    .item-row {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255, 255, 255, 0.6);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ff6b6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 12px; }
      .admin-header { flex-direction: column; text-align: center; }
      .stats { width: 100%; justify-content: center; }
      .filters { flex-direction: column; }
      .filter-group { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <div class="logo">
      <img src="logo.png" alt="Logo">
      <h1>CYBER DRAGON • ADMIN PANEL</h1>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalOrders">0</div>
        <div class="stat-label">Всего заказов</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="todayOrders">0</div>
        <div class="stat-label">Сегодня</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="newOrders">0</div>
        <div class="stat-label">Новые</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="all">📋 Все заказы</button>
    <button class="tab-btn" data-tab="new">🆕 Новые</button>
    <button class="tab-btn" data-tab="cooking">👨‍🍳 Готовятся</button>
    <button class="tab-btn" data-tab="ready">✅ Готовы</button>
    <button class="tab-btn" data-tab="completed">✔️ Завершены</button>
    <button class="tab-btn" data-tab="cancelled">❌ Отменены</button>
    <a class="tab-btn" href="menu_control.html">🍜 Управление меню</a>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>📅 Дата</label>
      <input type="date" id="dateFilter">
    </div>
    <div class="filter-group">
      <label>🔍 Поиск по коду/ID</label>
      <input type="text" id="searchFilter" placeholder="Код заказа или ID...">
    </div>
    <div class="filter-group">
      <label>🏷️ Тип заказа</label>
      <select id="typeFilter">
        <option value="">Все</option>
        <option value="on_site">На месте</option>
        <option value="takeaway">На вынос</option>
        <option value="delivery">Доставка</option>
      </select>
    </div>
    <div class="filter-group">
      <button id="refreshBtn">🔄 Обновить</button>
    </div>
  </div>

  <div class="orders-container">
    <div id="ordersList">
      <div class="loading">
        <div class="spinner"></div>
        <p>Загрузка заказов...</p>
      </div>
    </div>
  </div>

  <!-- Modal для деталей заказа -->
  <div class="modal" id="orderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 Детали заказа</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    // Конфигурация
    const API_BASE = "https://script.google.com/macros/s/AKfycbywwekrmdJvCnKuXKXY-D1_fkJDNm6ES9xAsptqRpoCOS6u9QidiSnGizIK0wybcGTl/exec";
    const LOCAL_API_BASE = `${window.location.origin}/api/local-orders`;
    const LOCAL_EVENTS_URL = `${window.location.origin}/api/local-events`;
    const ORDERS_KEY = 'CD_ORDERS_V1';
    let orders = [];
    let currentTab = 'all';
    let eventSource = null;
    let liveReloadTimer = null;

    // Статусы заказов
    const STATUSES = {
      NEW: { label: 'Новый', color: 'new', next: 'CONFIRMED' },
      CONFIRMED: { label: 'Подтверждён', color: 'confirmed', next: 'COOKING' },
      COOKING: { label: 'Готовится', color: 'cooking', next: 'READY' },
      READY: { label: 'Готов к выдаче', color: 'ready', next: 'COMPLETED' },
      HANDED: { label: 'Выдано', color: 'completed', next: null },
      COMPLETED: { label: 'Завершён', color: 'completed', next: null },
      CANCELLED: { label: 'Отменён', color: 'cancelled', next: null }
    };

    function normalizeStatus(value) {
      const raw = String(value || '').trim().toUpperCase();
      if (!raw || raw === 'SENT' || raw === 'FAILED') return 'NEW';
      if (raw === 'DONE') return 'HANDED';
      return raw;
    }

    function normalizeOrder(raw) {
      const code = String(raw?.code || raw?.order_code || raw?.id || '').trim();
      const id = String(raw?.id || raw?.order_id || code).trim();
      return {
        ...raw,
        id,
        code: code || id,
        status: normalizeStatus(raw?.status),
        created_at: raw?.created_at || raw?.createdAt || new Date().toISOString(),
        updated_at: raw?.updated_at || raw?.updatedAt || raw?.created_at || new Date().toISOString(),
        items: Array.isArray(raw?.items) ? raw.items : []
      };
    }

    function loadLocalOrders() {
      try {
        return JSON.parse(localStorage.getItem(ORDERS_KEY) || '{}') || {};
      } catch (_) {
        return {};
      }
    }

    function saveLocalOrders(map) {
      try {
        localStorage.setItem(ORDERS_KEY, JSON.stringify(map || {}));
      } catch (_) {}
    }

    function ordersToMap(list) {
      const map = {};
      for (const raw of list || []) {
        const order = normalizeOrder(raw);
        if (!order.code) continue;
        map[order.code] = order;
      }
      return map;
    }

    function orderStamp(order) {
      const stamp = new Date(order?.updated_at || order?.created_at).getTime();
      return Number.isFinite(stamp) ? stamp : 0;
    }

    function mergeOrderMaps(...sources) {
      const merged = new Map();

      for (const source of sources) {
        const values = Array.isArray(source) ? source : Object.values(source || {});

        for (const raw of values) {
          const order = normalizeOrder(raw);
          const key = order.code || order.id;
          if (!key) continue;

          if (!merged.has(key)) {
            merged.set(key, order);
            continue;
          }

          const current = merged.get(key);
          const useIncoming = orderStamp(order) >= orderStamp(current);
          const primary = useIncoming ? order : current;
          const fallback = useIncoming ? current : order;
          merged.set(key, {
            ...fallback,
            ...primary,
            sync: {
              ...(fallback.sync || {}),
              ...(primary.sync || {})
            }
          });
        }
      }

      return Array.from(merged.values()).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }

    async function fetchOrdersRemote() {
      const response = await fetch(API_BASE + '?action=get_orders', { cache: 'no-store' });
      return response.json();
    }

    async function fetchOrdersLocalBridge() {
      const response = await fetch(LOCAL_API_BASE, { cache: 'no-store' });
      return response.json();
    }

    async function pushOrderToLocalBridge(order) {
      const response = await fetch(LOCAL_API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      return response.json();
    }

    // Загрузка заказов
    async function loadOrders() {
      const localMap = loadLocalOrders();
      const [remoteResult, bridgeResult] = await Promise.allSettled([
        fetchOrdersRemote(),
        fetchOrdersLocalBridge()
      ]);

      const remoteData = remoteResult.status === 'fulfilled' ? remoteResult.value : null;
      const bridgeData = bridgeResult.status === 'fulfilled' ? bridgeResult.value : null;
      const remoteOrders = Array.isArray(remoteData?.orders) ? remoteData.orders : [];
      const bridgeMap = ordersToMap(Array.isArray(bridgeData?.orders) ? bridgeData.orders : []);

      orders = mergeOrderMaps(remoteOrders, bridgeMap, localMap);
      saveLocalOrders(ordersToMap(orders));
      updateStats();
      renderOrders();
    }

    function scheduleLiveReload(delay = 220) {
      clearTimeout(liveReloadTimer);
      liveReloadTimer = setTimeout(() => {
        loadOrders();
      }, delay);
    }

    function connectLocalEvents() {
      if (!window.EventSource || !LOCAL_EVENTS_URL.startsWith('http')) return;
      if (eventSource) eventSource.close();

      eventSource = new EventSource(LOCAL_EVENTS_URL);
      eventSource.addEventListener('orders_updated', () => scheduleLiveReload());
      eventSource.addEventListener('ready', () => scheduleLiveReload(80));
    }

    // Обновление статистики
    function updateStats() {
      const total = orders.length;
      const today = orders.filter(o => {
        const orderDate = new Date(o.created_at).toDateString();
        const todayDate = new Date().toDateString();
        return orderDate === todayDate;
      }).length;
      const newOrders = orders.filter(o => o.status === 'NEW' || !o.status).length;
      
      document.getElementById('totalOrders').textContent = total;
      document.getElementById('todayOrders').textContent = today;
      document.getElementById('newOrders').textContent = newOrders;
    }

    // Фильтрация заказов
    function filterOrders() {
      let filtered = [...orders];
      
      // Фильтр по табу
      if (currentTab !== 'all') {
        if (currentTab === 'new') {
          filtered = filtered.filter(o => o.status === 'NEW' || !o.status);
        } else {
          filtered = filtered.filter(o => o.status === currentTab.toUpperCase());
        }
      }
      
      // Фильтр по дате
      const dateFilter = document.getElementById('dateFilter').value;
      if (dateFilter) {
        filtered = filtered.filter(o => {
          const orderDate = new Date(o.created_at).toDateString();
          const filterDate = new Date(dateFilter).toDateString();
          return orderDate === filterDate;
        });
      }
      
      // Фильтр по поиску
      const searchFilter = document.getElementById('searchFilter').value.toLowerCase();
      if (searchFilter) {
        filtered = filtered.filter(o => 
          o.code?.toLowerCase().includes(searchFilter) ||
          o.id?.toLowerCase().includes(searchFilter) ||
          o.phone?.toLowerCase().includes(searchFilter)
        );
      }
      
      // Фильтр по типу
      const typeFilter = document.getElementById('typeFilter').value;
      if (typeFilter) {
        filtered = filtered.filter(o => o.type === typeFilter);
      }
      
      return filtered;
    }

    // Обновление статуса заказа
    async function updateOrderStatus(orderId, newStatus) {
      const orderIndex = orders.findIndex(o => o.id === orderId || o.code === orderId);
      if (orderIndex === -1) {
        showNotification('Заказ не найден', 'error');
        return;
      }

      const order = normalizeOrder({
        ...orders[orderIndex],
        status: newStatus,
        updated_at: new Date().toISOString()
      });
      orders[orderIndex] = order;
      saveLocalOrders(ordersToMap(orders));
      renderOrders();
      updateStats();

      await pushOrderToLocalBridge(order).catch(error => {
        console.error('Local bridge update failed:', error);
      });

      try {
        const response = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'update_status',
            order_id: orderId,
            status: newStatus
          })
        });
        await response.json();
        showNotification(`Статус заказа обновлён на ${STATUSES[newStatus]?.label || newStatus}`);
      } catch (error) {
        console.error('Error updating order status:', error);
        showNotification(`Статус обновлён локально: ${STATUSES[newStatus]?.label || newStatus}`, 'success');
      }
    }

    // Показать уведомление
    function showNotification(message, type = 'success') {
      // Создаем временное уведомление
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: ${type === 'error' ? '#e74c3c' : '#2ecc71'};
        color: white;
        padding: 12px 20px;
        border-radius: 12px;
        font-weight: 600;
        z-index: 2000;
        animation: slideIn 0.3s ease;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    // Открыть модалку с деталями
    function openModal(order) {
      const modalContent = document.getElementById('modalContent');
      const totalWithDelivery = (order.total || order.subtotal + (order.delivery_fee || 0)).toFixed(2);
      
      modalContent.innerHTML = `
        <div class="order-detail-row">
          <div class="order-detail-label">Код заказа</div>
          <div class="order-detail-value"><strong>${escapeHtml(order.code)}</strong></div>
        </div>
        <div class="order-detail-row">
          <div class="order-detail-label">ID заказа</div>
          <div class="order-detail-value">${escapeHtml(order.id)}</div>
        </div>
        <div class="order-detail-row">
          <div class="order-detail-label">Дата и время</div>
          <div class="order-detail-value">${new Date(order.created_at).toLocaleString()}</div>
        </div>
        <div class="order-detail-row">
          <div class="order-detail-label">Тип заказа</div>
          <div class="order-detail-value">
            <span class="order-type type-${order.type}">
              ${getOrderTypeLabel(order.type)}
            </span>
          </div>
        </div>
        <div class="order-detail-row">
          <div class="order-detail-label">Статус</div>
          <div class="order-detail-value">
            <span class="status status-${STATUSES[order.status]?.color || 'new'}">
              ${STATUSES[order.status]?.label || order.status || 'Новый'}
            </span>
          </div>
        </div>
        ${order.type === 'on_site' && order.table ? `
          <div class="order-detail-row">
            <div class="order-detail-label">Стол</div>
            <div class="order-detail-value">${escapeHtml(order.table)}</div>
          </div>
        ` : ''}
        ${order.type === 'takeaway' && order.pickup_in ? `
          <div class="order-detail-row">
            <div class="order-detail-label">Время до выдачи</div>
            <div class="order-detail-value">${escapeHtml(order.pickup_in)} минут</div>
          </div>
        ` : ''}
        ${order.type === 'delivery' && order.address ? `
          <div class="order-detail-row">
            <div class="order-detail-label">Адрес доставки</div>
            <div class="order-detail-value">${escapeHtml(order.address)}</div>
          </div>
        ` : ''}
        ${order.phone ? `
          <div class="order-detail-row">
            <div class="order-detail-label">Телефон</div>
            <div class="order-detail-value">${escapeHtml(order.phone)}</div>
          </div>
        ` : ''}
        <div class="order-detail-row">
          <div class="order-detail-label">Состав заказа</div>
          <div class="items-list">
            ${order.items?.flatMap(item => {
              const qty = Math.max(1, Number(item.qty || 1));
              const copies = Number.isInteger(qty) && qty > 1 ? qty : 1;
              return Array.from({ length: copies }, () => `
                <div class="item-row">
                  <strong>${escapeHtml(item.code || "—")} ${escapeHtml(item.name || item.code || "Позиция")}</strong>
                  ${item.selections ? `<div class="muted" style="font-size:0.8rem">${formatSelections(item.selections)}</div>` : ''}
                  ${item.note ? `<div class="muted" style="font-size:0.8rem">📝 ${escapeHtml(item.note)}</div>` : ''}
                </div>
              `);
            }).join('') || '<div class="muted">Нет позиций</div>'}
          </div>
        </div>
        <div class="order-detail-row">
          <div class="order-detail-label">Сумма</div>
          <div class="order-detail-value">${(order.subtotal || order.total || 0).toFixed(2)} грн</div>
        </div>
        ${order.delivery_fee ? `
          <div class="order-detail-row">
            <div class="order-detail-label">Доставка</div>
            <div class="order-detail-value">${order.delivery_fee.toFixed(2)} грн</div>
          </div>
        ` : ''}
        <div class="order-detail-row">
          <div class="order-detail-label">Итого к оплате</div>
          <div class="order-detail-value"><strong>${totalWithDelivery} грн</strong></div>
        </div>
      `;
      
      document.getElementById('orderModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('orderModal').classList.remove('active');
    }

    function getOrderTypeLabel(type) {
      const labels = {
        'on_site': '🍽️ На месте',
        'takeaway': '🥡 На вынос',
        'delivery': '🚚 Доставка'
      };
      return labels[type] || type;
    }

    function formatSelections(selections) {
      if (!selections) return '';
      const parts = [];
      for (const [key, value] of Object.entries(selections)) {
        if (Array.isArray(value)) {
          parts.push(`${key}: ${value.join(', ')}`);
        } else if (value) {
          parts.push(`${key}: ${value}`);
        }
      }
      return parts.join(' · ');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Рендер таблицы заказов
    function renderOrders() {
      const filtered = filterOrders();
      const container = document.getElementById('ordersList');
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="loading">
            <p>📭 Нет заказов</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = `
        <table class="orders-table">
          <thead>
            <tr>
              <th>Код</th>
              <th>Дата/Время</th>
              <th>Тип</th>
              <th>Сумма</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(order => `
              <tr>
                <td><strong>${escapeHtml(order.code)}</strong></td>
                <td>${new Date(order.created_at).toLocaleString()}</td>
                <td><span class="order-type type-${order.type}">${getOrderTypeLabel(order.type)}</span></td>
                <td>${(order.total || order.subtotal + (order.delivery_fee || 0)).toFixed(2)} грн</td>
                <td><span class="status status-${STATUSES[order.status]?.color || 'new'}">${STATUSES[order.status]?.label || order.status || 'Новый'}</span></td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-sm btn-view" onclick="openModal(${JSON.stringify(order).replace(/"/g, '&quot;')})">👁️</button>
                    ${order.status !== 'CANCELLED' && order.status !== 'COMPLETED' && order.status !== 'HANDED' ? `
                      ${STATUSES[order.status]?.next ? `
                        <button class="btn-sm btn-update" onclick="updateOrderStatus('${order.id || order.code}', '${STATUSES[order.status].next}')">
                          → ${STATUSES[STATUSES[order.status].next]?.label || 'Далее'}
                        </button>
                      ` : ''}
                      <button class="btn-sm btn-cancel" onclick="updateOrderStatus('${order.id || order.code}', 'CANCELLED')">Отмена</button>
                    ` : ''}
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    // Инициализация
    function init() {
      window.addEventListener('storage', (event) => {
        if (event.key !== ORDERS_KEY) return;
        orders = mergeOrderMaps(loadLocalOrders());
        updateStats();
        renderOrders();
      });
      window.addEventListener('beforeunload', () => {
        if (eventSource) eventSource.close();
      });

      connectLocalEvents();
      loadOrders();
      
      // Обработчики вкладок
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTab = btn.dataset.tab;
          renderOrders();
        });
      });
      
      // Обработчики фильтров
      document.getElementById('dateFilter').addEventListener('change', () => renderOrders());
      document.getElementById('searchFilter').addEventListener('input', () => renderOrders());
      document.getElementById('typeFilter').addEventListener('change', () => renderOrders());
      document.getElementById('refreshBtn').addEventListener('click', () => loadOrders());
      
      // Автообновление каждые 30 секунд
      setInterval(() => loadOrders(), 30000);
      
      // Закрытие модалки по Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
      });
      
      // Закрытие по клику вне модалки
      document.getElementById('orderModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('orderModal')) closeModal();
      });
    }
    
    init();
  </script>
  <script src="dlv_burger_menu.js"></script>
</body>
</html>
