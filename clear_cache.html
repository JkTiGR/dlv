<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DLV Cache Reset</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050101;
      --panel: rgba(24, 4, 7, 0.9);
      --text: #fff2ef;
      --muted: #d0a1a4;
      --ok: #ff9a3d;
      --line: rgba(255, 58, 45, 0.14);
      --accent: #ff2a1f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 42, 31, 0.2), transparent 38%),
        linear-gradient(180deg, #030000 0%, var(--bg) 100%);
    }

    .card {
      width: min(640px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .status {
      margin: 18px 0 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 154, 61, 0.28);
      background: rgba(255, 42, 31, 0.08);
      color: var(--ok);
      font-weight: 600;
    }

    ul {
      margin: 0 0 20px 18px;
      padding: 0;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    a:hover {
      border-color: rgba(255, 42, 31, 0.48);
      background: rgba(255, 42, 31, 0.1);
    }

    code {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>DLV cache reset</h1>
    <p id="modeLine">Cleaning safe local cache keys for this DLV origin.</p>
    <div class="status" id="status">Clearing cache...</div>
    <ul id="details"></ul>
    <p>
      This page clears cached order data and browser cache storage for
      <code>127.0.0.1:8000</code> without touching shift data or contron stock data.
    </p>
    <div class="links" id="links"></div>
  </main>

  <script src="dlv_static_config.js"></script>
  <script>
    const SAFE_LOCAL_KEYS = [
      "CD_ORDERS_V1",
      "CD_KASSA_LAST_SYNC_V1"
    ];

    function qs(name) {
      return new URLSearchParams(window.location.search).get(name) || "";
    }

    function withStamp(path) {
      const url = new URL(path, window.location.href);
      url.searchParams.set("v", String(Date.now()));
      return url.toString();
    }

    function safeNextPath(raw) {
      if (!raw) return "";
      if (!/^[A-Za-z0-9._/?=&-]+$/.test(raw)) return "";
      if (raw.startsWith("http://") || raw.startsWith("https://")) return "";
      return raw;
    }

    async function clearCache() {
      const mode = qs("mode") === "full" ? "full" : "safe";
      const details = [];

      if (mode === "full") {
        document.getElementById("modeLine").textContent =
          "Cleaning full local browser storage for this DLV origin.";
        const localKeys = Object.keys(localStorage);
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem("CD_KASSA_SHIFT_V1", JSON.stringify({
          opened_at: new Date().toISOString(),
          opening_cash: 0,
          note: ""
        }));
        details.push(`localStorage cleared (${localKeys.length} keys)`);
        details.push("sessionStorage cleared for this tab");

        if (window.DLV_STATIC?.localOrdersApi) {
          try {
            const response = await fetch(window.DLV_STATIC.localOrdersApi, { method: "DELETE" });
            const payload = await response.json();
            details.push(`local bridge cleared (${Number(payload?.removed || 0)} orders)`);
          } catch (error) {
            details.push(`local bridge reset failed: ${error.message}`);
          }
        } else {
          details.push("static GitHub mode: local bridge not used");
        }
      } else {
        let removed = 0;
        SAFE_LOCAL_KEYS.forEach((key) => {
          if (localStorage.getItem(key) !== null) {
            localStorage.removeItem(key);
            removed += 1;
          }
        });
        details.push(`safe localStorage keys removed (${removed})`);
      }

      if ("caches" in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map((name) => caches.delete(name)));
        details.push(`CacheStorage cleared (${cacheNames.length} entries)`);
      } else {
        details.push("CacheStorage not used");
      }

      if ("serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map((reg) => reg.unregister()));
        details.push(`service workers removed (${regs.length})`);
      } else {
        details.push("service workers not available");
      }

      document.getElementById("status").textContent = "Cache cleared.";
      const list = document.getElementById("details");
      details.forEach((line) => {
        const li = document.createElement("li");
        li.textContent = line;
        list.appendChild(li);
      });

      const links = [
        ["Menu", "index.html"],
        ["Kassa", "DLV_KASSA.html"],
        ["Contron", "contron.html"],
        ["View", "VIEW.html"],
        ["Monitor", "MONITOR.html"]
      ];
      const linksWrap = document.getElementById("links");
      links.forEach(([label, path]) => {
        const a = document.createElement("a");
        a.href = withStamp(path);
        a.textContent = label;
        linksWrap.appendChild(a);
      });

      const next = safeNextPath(qs("next"));
      if (next) {
        setTimeout(() => {
          window.location.replace(withStamp(next));
        }, 900);
      }
    }

    clearCache().catch((error) => {
      document.getElementById("status").textContent = `Cache reset failed: ${error.message}`;
    });
  </script>
  <script src="dlv_burger_menu.js"></script>
</body>
</html>
